<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Timeline Planner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
margin:0;
padding:10px;
}

.container{
max-width:600px;
margin:auto;
}

.input-box,.target-box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:95%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 15px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.timeline{
border-left:3px solid #ccc;
margin-left:20px;
padding-left:20px;
text-align:left;
}

.timeline-item{
margin:20px 0;
position:relative;
}

.dot{
width:16px;
height:16px;
background:red;
border-radius:50%;
position:absolute;
left:-29px;
top:8px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.time{
color:#0077ff;
font-weight:bold;
}

.complete{
margin-top:8px;
}

/* phone friendly */
@media (max-width:600px){

h1{
font-size:22px;
}

.container{
width:100%;
}

input,textarea{
width:92%;
}

}

</style>
</head>

<body>

<h1>📅 Daily Timeline Planner</h1>

<div class="container">

<!-- YEARLY TARGET -->

<div class="target-box">

<h3>🎯 Yearly Target</h3>

<textarea id="yearTarget" placeholder="Your goal for this year"></textarea>

<button onclick="saveYearTarget()">Save Year Target</button>

</div>

<!-- MONTHLY TARGET -->

<div class="target-box">

<h3>📆 Monthly Target</h3>

<textarea id="monthTarget" placeholder="Your goal for this month"></textarea>

<button onclick="saveMonthTarget()">Save Month Target</button>

</div>

<!-- TASK INPUT -->

<div class="input-box">

<input type="date" id="taskDate">

<input id="taskTime" placeholder="Time (7:00 AM)">

<input id="taskTitle" placeholder="Task">

<input id="taskDesc" placeholder="Description">

<br>

<button onclick="addTask()">Add Task</button>

</div>

<div id="timeline" class="timeline"></div>

<div>

<h3>Select Day</h3>

<input type="date" id="viewDate" onchange="loadTasks()">

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){

let date=document.getElementById("taskDate").value;
let time=document.getElementById("taskTime").value;
let title=document.getElementById("taskTitle").value;
let desc=document.getElementById("taskDesc").value;

if(title==="") return;

tasks.push({
date,
time,
title,
desc,
done:false
});

saveTasks();
loadTasks();
}

function toggleComplete(index){

tasks[index].done=!tasks[index].done;

saveTasks();
loadTasks();
}

function loadTasks(){

let timeline=document.getElementById("timeline");
timeline.innerHTML="";

let selected=document.getElementById("viewDate").value;

tasks.forEach((task,i)=>{

if(task.date===selected){

let item=document.createElement("div");
item.className="timeline-item";

item.innerHTML=`

<div class="dot"></div>

<div class="card">

<div class="time">${task.time}</div>

<h3 style="text-decoration:${task.done?'line-through':'none'}">

${task.title}

</h3>

<p>${task.desc}</p>

<label class="complete">

<input type="checkbox"
${task.done?'checked':''}
onclick="toggleComplete(${i})">

Complete

</label>

</div>

`;

timeline.appendChild(item);

}

});

}

/* YEAR TARGET */

function saveYearTarget(){

let text=document.getElementById("yearTarget").value;

localStorage.setItem("yearTarget",text);

}

document.getElementById("yearTarget").value=
localStorage.getItem("yearTarget") || "";


/* MONTH TARGET */

function saveMonthTarget(){

let text=document.getElementById("monthTarget").value;

localStorage.setItem("monthTarget",text);

}

document.getElementById("monthTarget").value=
localStorage.getItem("monthTarget") || "";

</script>

</body>
</html>
