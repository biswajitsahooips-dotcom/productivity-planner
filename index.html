<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Daily Timeline Planner</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
width:500px;
margin:auto;
}

.input-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.timeline{
border-left:3px solid #ccc;
margin-left:40px;
padding-left:20px;
text-align:left;
}

.timeline-item{
margin:20px 0;
position:relative;
}

.dot{
width:16px;
height:16px;
background:red;
border-radius:50%;
position:absolute;
left:-29px;
top:5px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.time{
color:#0077ff;
font-weight:bold;
}

</style>

</head>

<body>

<h1>📅 Daily Timeline Planner</h1>

<div class="container">

<div class="input-box">

<input id="taskTitle" placeholder="Task Name">

<input id="taskTime" placeholder="Time (example: 7:00 AM)">

<input id="taskDesc" placeholder="Description">

<br>

<button onclick="addTask()">Add Task</button>

</div>

<div id="timeline" class="timeline"></div>

</div>

<script>

function addTask(){

let title=document.getElementById("taskTitle").value;
let time=document.getElementById("taskTime").value;
let desc=document.getElementById("taskDesc").value;

if(title==="") return;

let timeline=document.getElementById("timeline");

let item=document.createElement("div");
item.className="timeline-item";

item.innerHTML=`

<div class="dot"></div>

<div class="card">

<div class="time">${time}</div>

<h3>${title}</h3>

<p>${desc}</p>

</div>

`;

timeline.appendChild(item);

}

</script>

</body>

</html>
