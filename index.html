<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Timeline Planner</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.container{
width:500px;
margin:auto;
}

.input-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.timeline{
border-left:3px solid #ccc;
margin-left:40px;
padding-left:20px;
text-align:left;
}

.timeline-item{
margin:20px 0;
position:relative;
}

.dot{
width:16px;
height:16px;
background:red;
border-radius:50%;
position:absolute;
left:-29px;
top:8px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

.time{
color:#0077ff;
font-weight:bold;
}

.complete{
margin-top:8px;
}

.calendar{
margin-top:20px;
}

</style>
</head>

<body>

<h1>📅 Daily Timeline Planner</h1>

<div class="container">

<div class="input-box">

<input type="date" id="taskDate">

<input id="taskTime" placeholder="Time (7:00 AM)">

<input id="taskTitle" placeholder="Task">

<input id="taskDesc" placeholder="Description">

<br>

<button onclick="addTask()">Add Task</button>

</div>

<div id="timeline" class="timeline"></div>

<div class="calendar">

<h3>Select Day</h3>

<input type="date" id="viewDate" onchange="loadTasks()">

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){

let date=document.getElementById("taskDate").value;
let time=document.getElementById("taskTime").value;
let title=document.getElementById("taskTitle").value;
let desc=document.getElementById("taskDesc").value;

if(title==="") return;

tasks.push({
date,
time,
title,
desc,
done:false
});

saveTasks();
loadTasks();
}

function toggleComplete(index){

tasks[index].done=!tasks[index].done;

saveTasks();
loadTasks();
}

function loadTasks(){

let timeline=document.getElementById("timeline");
timeline.innerHTML="";

let selected=document.getElementById("viewDate").value;

tasks.forEach((task,i)=>{

if(task.date===selected){

let item=document.createElement("div");
item.className="timeline-item";

item.innerHTML=`

<div class="dot"></div>

<div class="card">

<div class="time">${task.time}</div>

<h3 style="text-decoration:${task.done?'line-through':'none'}">

${task.title}

</h3>

<p>${task.desc}</p>

<label class="complete">

<input type="checkbox"

${task.done?'checked':''}

onclick="toggleComplete(${i})">

Complete

</label>

</div>

`;

timeline.appendChild(item);

}

});

}

</script>

</body>
</html>
