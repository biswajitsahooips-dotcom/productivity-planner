<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Planner</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:10px;
text-align:center;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

.container{
max-width:650px;
margin:auto;
}

.box{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.dark .box{
background:#2c2c2c;
}

input,textarea{
width:95%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 15px;
background:#0077ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.progress{
width:100%;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:15px;
background:#00c853;
width:0%;
}

.timeline{
border-left:3px solid #ccc;
margin-left:20px;
padding-left:20px;
text-align:left;
}

.timeline-item{
margin:20px 0;
position:relative;
}

.dot{
width:14px;
height:14px;
background:red;
border-radius:50%;
position:absolute;
left:-27px;
top:6px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.dark .card{
background:#3a3a3a;
}

.time{
color:#0077ff;
font-weight:bold;
}

@media(max-width:600px){

input,textarea{
width:92%;
}

}

</style>
</head>

<body>

<h1>📅 Life Planner</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="container">

<!-- YEAR GOAL -->

<div class="box">

<h3>🎯 Yearly Goals</h3>

<textarea id="yearGoals" placeholder="Write yearly goals"></textarea>

<input type="number" id="yearProgress" placeholder="Progress %">

<button onclick="saveYear()">Save</button>

<div class="progress">
<div id="yearBar" class="progress-bar"></div>
</div>

</div>

<!-- MONTH GOAL -->

<div class="box">

<h3>📆 Monthly Goals</h3>

<textarea id="monthGoals"></textarea>

<input type="number" id="monthProgress" placeholder="Progress %">

<button onclick="saveMonth()">Save</button>

<div class="progress">
<div id="monthBar" class="progress-bar"></div>
</div>

</div>

<!-- HABITS -->

<div class="box">

<h3>✅ Daily Habits</h3>

<label><input type="checkbox" id="habit1"> Exercise</label><br>
<label><input type="checkbox" id="habit2"> Study</label><br>
<label><input type="checkbox" id="habit3"> Read Book</label><br>

<button onclick="saveHabits()">Save Habits</button>

</div>

<!-- TASK INPUT -->

<div class="box">

<h3>🕒 Add Task</h3>

<input type="date" id="taskDate">

<input id="taskTime" placeholder="Time">

<input id="taskTitle" placeholder="Task">

<input id="taskDesc" placeholder="Description">

<button onclick="addTask()">Add Task</button>

</div>

<div id="timeline" class="timeline"></div>

<input type="date" id="viewDate" onchange="loadTasks()">

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){

let date=taskDate.value;
let time=taskTime.value;
let title=taskTitle.value;
let desc=taskDesc.value;

if(title==="") return;

tasks.push({date,time,title,desc,done:false});

saveTasks();
loadTasks();
}

function toggleDone(i){

tasks[i].done=!tasks[i].done;

saveTasks();
loadTasks();
}

function loadTasks(){

timeline.innerHTML="";

let d=viewDate.value;

tasks.forEach((t,i)=>{

if(t.date===d){

let div=document.createElement("div");

div.className="timeline-item";

div.innerHTML=`

<div class="dot"></div>

<div class="card">

<div class="time">${t.time}</div>

<h3 style="text-decoration:${t.done?'line-through':'none'}">${t.title}</h3>

<p>${t.desc}</p>

<input type="checkbox" ${t.done?'checked':''} onclick="toggleDone(${i})"> Done

</div>

`;

timeline.appendChild(div);

}

});

}

/* YEAR */

function saveYear(){

localStorage.setItem("yearGoals",yearGoals.value);
localStorage.setItem("yearProgress",yearProgress.value);

yearBar.style.width=yearProgress.value+"%";

}

/* MONTH */

function saveMonth(){

localStorage.setItem("monthGoals",monthGoals.value);
localStorage.setItem("monthProgress",monthProgress.value);

monthBar.style.width=monthProgress.value+"%";

}

/* HABITS */

function saveHabits(){

localStorage.setItem("habit1",habit1.checked);
localStorage.setItem("habit2",habit2.checked);
localStorage.setItem("habit3",habit3.checked);

}

/* DARK MODE */

function toggleDark(){

document.body.classList.toggle("dark");

}

/* LOAD DATA */

yearGoals.value=localStorage.getItem("yearGoals")||"";
yearProgress.value=localStorage.getItem("yearProgress")||0;
yearBar.style.width=yearProgress.value+"%";

monthGoals.value=localStorage.getItem("monthGoals")||"";
monthProgress.value=localStorage.getItem("monthProgress")||0;
monthBar.style.width=monthProgress.value+"%";

habit1.checked=localStorage.getItem("habit1")==="true";
habit2.checked=localStorage.getItem("habit2")==="true";
habit3.checked=localStorage.getItem("habit3")==="true";

</script>

</body>
</html>
